<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blue Square</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&display=swap');

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%; height: 100%;
        background: #050306;
        display: flex; align-items: center; justify-content: center;
        overflow: hidden;
        font-family: 'IM Fell English', serif;
      }

      #canvas-container canvas {
        display: block;
        box-shadow:
          0 0 0 1px rgba(10, 30, 140, 0.3),
          0 0 40px rgba(0, 20, 120, 0.25),
          0 0 100px rgba(0, 10, 80, 0.15),
          0 60px 120px rgba(0, 0, 0, 0.9);
      }
    </style>
  </head>
  <body>
    <main id="canvas-container"></main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
    <script>
// ─── Config ───────────────────────────────────────────────────────
const ACCENT        = [30, 60, 160];
const ACCENT_BRIGHT = [70, 110, 220];
const FRAME_PAD     = 28;

let drips = [], smokeParticles = [], pulseParticles = [];
let t = 0;
let sqScale = 0;
let hovered = false;
let sqRotation = 0;
let clickRipples = [];

// ─── Drip (blue-tinted) ───────────────────────────────────────────
class Drip {
  constructor(x) {
    this.x = x;
    this.y = FRAME_PAD - 2;
    this.len   = random(10, 38);
    this.speed = random(0.3, 1.1);
    this.w     = random(1.5, 3.5);
    this.alpha = random(160, 230);
    // Blue or dark-blue drips
    this.r = 10; this.g = 20;
    this.b = random() > 0.5 ? 160 : 80;
  }
  update() { this.y += this.speed; }
  draw() {
    strokeWeight(this.w);
    stroke(this.r, this.g, this.b, this.alpha);
    line(this.x, this.y - this.len, this.x, this.y);
    noStroke();
    fill(this.r, this.g, this.b, this.alpha * 0.6);
    ellipse(this.x, this.y, this.w * 2.5, this.w * 2.5);
  }
  isDead() { return this.y - this.len > height; }
}

class Smoke {
  constructor(x, y) {
    this.x = x + random(-16, 16);
    this.y = y;
    this.vx = random(-0.4, 0.4);
    this.vy = random(-1, -0.3);
    this.alpha = random(60, 120);
    this.size  = random(6, 16);
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.alpha -= 2.5; this.size += 0.3;
  }
  draw() {
    noStroke();
    fill(ACCENT_BRIGHT[0], ACCENT_BRIGHT[1], ACCENT_BRIGHT[2], this.alpha);
    ellipse(this.x, this.y, this.size);
  }
  isDead() { return this.alpha <= 0; }
}

class PulseRect {
  constructor(cx, cy, sw, sh) {
    this.cx = cx; this.cy = cy;
    this.sw = sw; this.sh = sh;
    this.expand = 0; this.alpha = 200;
  }
  update() { this.expand += 3; this.alpha -= 4; }
  draw() {
    noFill();
    stroke(ACCENT_BRIGHT[0], ACCENT_BRIGHT[1], ACCENT_BRIGHT[2], this.alpha);
    strokeWeight(1.5);
    let e = this.expand;
    rect(this.cx - this.sw/2 - e, this.cy - this.sh/2 - e,
         this.sw + e*2, this.sh + e*2);
  }
  isDead() { return this.alpha <= 0; }
}

// ─── Setup ────────────────────────────────────────────────────────
function setup() {
  let cnv = createCanvas(620, 460);
  cnv.parent("canvas-container");
  for (let i = 0; i < 12; i++) {
    let d = new Drip(random(FRAME_PAD + 10, width - FRAME_PAD - 10));
    d.y = random(FRAME_PAD, height * 0.4);
    drips.push(d);
  }
}

// ─── Draw ─────────────────────────────────────────────────────────
function draw() {
  background(4, 5, 10);
  t += 0.01;
  sqScale = min(sqScale + 0.025, 1);

  drawAtmosphere();
  drawFrame();
  drawTitle();
  drawBlueSquare();
  drawSubtitle();

  if (frameCount % 18 === 0)
    drips.push(new Drip(random(FRAME_PAD + 10, width - FRAME_PAD - 10)));
  drips = drips.filter(d => !d.isDead());
  drips.forEach(d => { d.update(); d.draw(); });

  smokeParticles = smokeParticles.filter(s => !s.isDead());
  smokeParticles.forEach(s => { s.update(); s.draw(); });

  pulseParticles = pulseParticles.filter(p => !p.isDead());
  pulseParticles.forEach(p => { p.update(); p.draw(); });

  clickRipples = clickRipples.filter(r => !r.isDead());
  clickRipples.forEach(r => { r.update(); r.draw(); });

  drawFrameOverlay();
  drawBackButton();
}

function drawAtmosphere() {
  noStroke();
  // Blue vignette instead of red
  for (let r = max(width, height); r > 0; r -= 20) {
    let alpha = map(r, 0, max(width, height), 0, 14);
    fill(0, 10, 80, alpha);
    ellipse(width / 2, height / 2, r * 2);
  }
  // Fog wisps — blue-tinted
  for (let i = 0; i < 3; i++) {
    let wx = (sin(t * 0.4 + i * 2.1) * 0.5 + 0.5) * width;
    let wy = height * 0.75 + sin(t * 0.3 + i) * 20;
    for (let s = 80; s > 0; s -= 15) {
      fill(10, 20, 50, map(s, 0, 80, 0, 6));
      ellipse(wx, wy, s * 3, s * 1.2);
    }
  }
}

function drawFrame() {
  let p = FRAME_PAD;
  stroke(10, 20, 80); strokeWeight(3); noFill();
  rect(p, p, width - p * 2, height - p * 2);
  stroke(20, 40, 140, 180); strokeWeight(0.8);
  rect(p + 6, p + 6, width - (p + 6) * 2, height - (p + 6) * 2);
  drawCorner(p, p, 0); drawCorner(width - p, p, 1);
  drawCorner(p, height - p, 2); drawCorner(width - p, height - p, 3);
}

function drawCorner(x, y, corner) {
  push(); translate(x, y);
  scale((corner===1||corner===3)?-1:1, (corner===2||corner===3)?-1:1);
  stroke(20, 40, 160, 200); strokeWeight(1); noFill();
  line(0, 0, 18, 0); line(0, 0, 0, 18);
  fill(10, 20, 120, 160); noStroke();
  beginShape();
  vertex(0,-5); vertex(5,0); vertex(0,5); vertex(-5,0);
  endShape(CLOSE);
  stroke(20, 40, 160, 120); strokeWeight(0.8);
  line(9, 0, 9, 5); line(0, 9, 5, 9);
  pop();
}

function drawFrameOverlay() {
  noStroke();
  for (let y = FRAME_PAD + 6; y < height - FRAME_PAD - 6; y += 4) {
    fill(0, 0, 0, 18);
    rect(FRAME_PAD + 6, y, width - (FRAME_PAD + 6) * 2, 2);
  }
  fill(4, 5, 10); noStroke();
  rect(0, 0, width, FRAME_PAD - 1);
  rect(0, height - FRAME_PAD + 1, width, FRAME_PAD);
  rect(0, 0, FRAME_PAD - 1, height);
  rect(width - FRAME_PAD + 1, 0, FRAME_PAD, height);
}

function drawTitle() {
  noStroke();
  for (let s = 40; s > 0; s -= 8) {
    fill(0, 20, 160, map(s, 0, 40, 0, 10));
    ellipse(width / 2, 62, s * 5, s * 1.5);
  }
  fill(180, 200, 240);
  textFont("serif"); textSize(15); textStyle(BOLD); textAlign(CENTER, CENTER);
  text("⸸ BLUE SQUARE ⸸", width / 2, 62);
  stroke(15, 20, 100, 160); strokeWeight(0.8);
  line(width / 2 - 110, 76, width / 2 + 110, 76);
  noStroke(); fill(20, 40, 160, 120); textSize(10);
  text("✦", width / 2 - 88, 62);
  text("✦", width / 2 + 88, 62);
}

function drawBlueSquare() {
  let cx = width / 2;
  let cy = height / 2 + 20;
  let sw = 160, sh = 160;
  let pulse = sin(t * 2) * 3;
  let sc = sqScale < 1 ? easeOutBack(sqScale) : 1;

  // Slow continuous rotation on hover
  if (hovered) sqRotation += 0.008;
  else sqRotation += 0.002;

  // Hover check (rotated AABB approximation — use circle for simplicity)
  let d = dist(mouseX, mouseY, cx, cy);
  hovered = d < 100 * sc;
  if (hovered) cursor(HAND);
  else cursor("default");

  // Smoke on hover
  if (hovered && frameCount % 4 === 0) {
    let side = floor(random(4));
    let rx = cx + random(-sw/2, sw/2) * sc;
    let ry = cy + random(-sh/2, sh/2) * sc;
    if (side === 0) ry = cy - sh/2 * sc;
    else if (side === 1) ry = cy + sh/2 * sc;
    else if (side === 2) rx = cx - sw/2 * sc;
    else rx = cx + sw/2 * sc;
    smokeParticles.push(new Smoke(rx, ry));
  }

  // Pulse rect (continuous)
  if (frameCount % 40 === 0)
    pulseParticles.push(new PulseRect(cx, cy, sw * sc, sh * sc));

  push();
  translate(cx, cy);
  scale(sc);
  rotate(sqRotation);

  let hw = sw / 2, hh = sh / 2;

  // Outer glow layers
  noStroke();
  for (let spread = 50; spread > 0; spread -= 7) {
    let a = map(spread, 0, 50, 0, hovered ? 28 : 12) * (sin(t * 1.5) * 0.2 + 0.8);
    fill(ACCENT_BRIGHT[0], ACCENT_BRIGHT[1], ACCENT_BRIGHT[2], a);
    rect(-hw - spread + pulse, -hh - spread + pulse,
         sw + spread*2 - pulse*2, sh + spread*2 - pulse*2);
  }

  // Main square fill — gradient simulation
  noStroke();
  for (let r = hw; r > 0; r -= 3) {
    let bright = map(r, 0, hw, 160, 30);
    let alpha = map(r, 0, hw, 255, 180);
    fill(bright * 0.3 + (hovered ? 10 : 0), bright * 0.5, bright + (hovered ? 20 : 0), alpha);
    rect(-r, -r * (sh/sw), r * 2, r * 2 * (sh/sw));
  }

  // Inner shine (top-left)
  noStroke();
  for (let r = 28; r > 0; r -= 5) {
    fill(100, 160, 255, map(r, 0, 28, 0, 35));
    ellipse(-hw * 0.4, -hh * 0.4, r * 1.6, r * 1.1);
  }

  // Outer border
  strokeWeight(hovered ? 2.5 : 1.5);
  stroke(ACCENT_BRIGHT[0], ACCENT_BRIGHT[1], ACCENT_BRIGHT[2], hovered ? 255 : 180);
  noFill();
  rect(-hw - pulse, -hh - pulse, sw + pulse*2, sh + pulse*2);

  // Inner inset border
  strokeWeight(0.5); stroke(40, 80, 200, 80);
  rect(-hw + 8, -hh + 8, sw - 16, sh - 16);

  // Corner ornament marks (match frame style)
  stroke(ACCENT_BRIGHT[0], ACCENT_BRIGHT[1], ACCENT_BRIGHT[2], hovered ? 200 : 100);
  strokeWeight(1.5);
  let cs = 14;
  // TL
  line(-hw, -hh, -hw + cs, -hh); line(-hw, -hh, -hw, -hh + cs);
  // TR
  line( hw, -hh,  hw - cs, -hh); line( hw, -hh,  hw, -hh + cs);
  // BL
  line(-hw,  hh, -hw + cs,  hh); line(-hw,  hh, -hw,  hh - cs);
  // BR
  line( hw,  hh,  hw - cs,  hh); line( hw,  hh,  hw,  hh - cs);

  // Rotating rune marks (opposite direction from red circle)
  push();
  rotate(-t * 0.25);
  stroke(20, 50, 160, 70); strokeWeight(0.8); noFill();
  for (let i = 0; i < 8; i++) {
    let a = (TWO_PI / 8) * i;
    let r = hw + 22;
    push();
    translate(cos(a) * r, sin(a) * r);
    rotate(a + PI / 2);
    line(-4, 0, 4, 0); line(0, -4, 0, 4);
    pop();
  }
  pop();

  // Diagonal cross inside (gothic detail)
  stroke(20, 50, 160, 30); strokeWeight(0.6);
  line(-hw + 8, -hh + 8, hw - 8, hh - 8);
  line( hw - 8, -hh + 8, -hw + 8, hh - 8);

  // Hover label
  if (hovered) {
    noStroke();
    fill(180, 200, 240, 200);
    textFont("serif"); textSize(11); textStyle(ITALIC); textAlign(CENTER, CENTER);
    text("CLICK TO ENTER", 0, hh + 28);
  }

  pop();
}

function drawSubtitle() {
  noStroke();
  fill(90, 110, 160, 160);
  textFont("serif"); textSize(10); textStyle(ITALIC); textAlign(CENTER, CENTER);
  text("vero279.github.io/BlueSquare/", width / 2, height - FRAME_PAD - 22);
}

function drawBackButton() {
  let bx = FRAME_PAD + 14, by = FRAME_PAD + 14;
  let bw = 80, bh = 22;
  let over = mouseX >= bx && mouseX <= bx + bw && mouseY >= by && mouseY <= by + bh;

  noFill();
  stroke(20, 40, 140, over ? 220 : 120); strokeWeight(over ? 1.5 : 0.8);
  rect(bx, by, bw, bh);

  noStroke();
  fill(180, 200, 240, over ? 220 : 120);
  textFont("serif"); textSize(10); textStyle(NORMAL); textAlign(LEFT, CENTER);
  text("⟵ BACK", bx + 8, by + bh / 2);

  if (over) cursor(HAND);
}

// ─── Interaction ──────────────────────────────────────────────────
function mousePressed() {
  let bx = FRAME_PAD + 14, by = FRAME_PAD + 14, bw = 80, bh = 22;
  if (mouseX >= bx && mouseX <= bx + bw && mouseY >= by && mouseY <= by + bh) {
    window.history.back();
    return;
  }
  let cx = width / 2, cy = height / 2 + 20;
  if (dist(mouseX, mouseY, cx, cy) < 100) {
    let sw = 160 * sqScale, sh = 160 * sqScale;
    clickRipples.push(new PulseRect(cx, cy, sw, sh));
    clickRipples.push(new PulseRect(cx, cy, sw, sh));
  }
}

function easeOutBack(x) {
  const c1 = 1.70158, c3 = c1 + 1;
  return 1 + c3 * pow(x - 1, 3) + c1 * pow(x - 1, 2);
}
    </script>
  </body>
</html>
